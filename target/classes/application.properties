# ─── Base de datos MySQL ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/seguridad_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Jair0621
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ─── Servidor ────────────────────────────────────────────────────────────────
server.port=8080

# ─── Sesión: cookie HttpOnly y Secure ────────────────────────────────────────
server.servlet.session.cookie.http-only=true
# Activar en producción con HTTPS:
# server.servlet.session.cookie.secure=true
server.servlet.session.timeout=30m