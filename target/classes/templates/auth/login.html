<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesión — Seguridad Web</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 { color: #f8fafc; font-size: 1.5rem; font-weight: 700; }
        .logo p  { color: #94a3b8; font-size: 0.85rem; margin-top: 0.3rem; }
        .badge {
            display: inline-block;
            background: #1d4ed8;
            color: #bfdbfe;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 999px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
        }
        .alert-error   { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
        .alert-success { background: #052e16; color: #86efac; border: 1px solid #14532d; }
        .alert-info    { background: #0c1a3a; color: #93c5fd; border: 1px solid #1e3a5f; }
        label { display: block; color: #cbd5e1; font-size: 0.875rem; margin-bottom: 0.4rem; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.95rem;
            margin-bottom: 1.25rem;
            transition: border-color .2s;
        }
        input:focus { outline: none; border-color: #3b82f6; }
        button[type="submit"] {
            width: 100%;
            padding: 0.875rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        button[type="submit"]:hover { background: #1d4ed8; }
        .link-row {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.875rem;
            color: #64748b;
        }
        .link-row a { color: #60a5fa; text-decoration: none; }
        .link-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <span class="badge">UDES — Seguridad Web</span>
        <h1>Iniciar Sesión</h1>
        <p>Unidad 9 — Spring Security</p>
    </div>

    <!-- Mensajes de estado -->
    <div class="alert alert-error" th:if="${param.error}">
        ⚠ Correo o contraseña incorrectos. Inténtalo de nuevo.
    </div>
    <div class="alert alert-success" th:if="${param.logout}">
        ✓ Sesión cerrada correctamente.
    </div>
    <div class="alert alert-info" th:if="${param.registrado}">
        ✓ Registro exitoso. Inicia sesión con tus credenciales.
    </div>

    <!--
        Spring Security intercepta el POST /login automáticamente.
        Thymeleaf + spring-security inyecta el token _csrf oculto
        gracias al namespace sec y al th:action.
    -->
    <form th:action="@{/login}" method="post">
        <label for="username">Correo electrónico</label>
        <input type="email" id="username" name="username"
               placeholder="usuario@correo.com" required autofocus/>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" required/>

        <!-- Token CSRF incluido automáticamente por Thymeleaf + Spring Security -->
        <button type="submit">Ingresar</button>
    </form>

    <div class="link-row">
        ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a>
    </div>
</div>
</body>
</html>
